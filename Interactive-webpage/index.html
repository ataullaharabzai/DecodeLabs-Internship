<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabzai Hospital</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <h2>Arabzai Complex</h2>
            </div>
            <ul class="nav-items">
                <li>Home</li>
                <li>Doctors</li>
                <li>Services</li>
                <li>Contact Us</li>
            </ul>
            <div class="nav-btns">
                <button id="toggle-theme">Light</button>
                <button id="login-out-btn">Log out</button>
            </div>
        </nav>
    </header>

    <div class="login-card" style="display: none;">
        <h2>Login to continue</h2>
        <div class="inputs">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
        </div>
        <button id="login-btn" type="submit">Login</button>
    </div>

    <main>
        <section class="dashboard">
            <div class="hero">
                <p id="big-title">Every Smile Deserves the <span id="title-best">Best Care</span></p>
                <p>From preventive care to cosmetic solutions, We are here to keep you smiling confidently</p>
                <div class="hero-btns">
                    <button>Explore Services</button>
                    <button>Book Appointment</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
