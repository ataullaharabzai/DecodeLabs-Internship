<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <h1>WeCare</h1>
            </div>
            <button>Login</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p id="hero-title"><span>Mental health</span><br> personalized to you</p>
            <p id="small-title">Customized care starts here</p>
        </section>

        <article>
            <div class="container">
                <div class="card">
                    <p>Loss <span id="weight">weight</span></p>
                    <img src="images/loss-icon.png" alt="loss weight">
                </div>
                <div class="card">
                    <p>Regrow <span id="hair">hair</span></p>
                    <img src="images/hair-icon.avif" alt="Regrow hair">
                </div>
                <div class="card">
                    <p>Have long <span id="breath">breath</span></p>
                    <img src="images/breath-icon.webp" alt="have long breath">
                </div>
                <div class="card">
                    <p>Have better <span id="feeling">feeling</span></p>
                    <img src="images/better-icon.jfif" alt="have better feeling">
                </div>
                <div class="card">
                    <p>Tackle <span id="anxiety">anxiety</span></p>
                    <img src="images/anxiety-icon.jpg" alt="reduce anxiety">
                </div>
                <div class="card">
                    <p>Get smooth <span id="skin">skin</span></p>
                    <img src="images/skin-icon.png" alt="smooth skin">
                </div>
            </div>
        </article>
    </main>
    <footer>
        <div class="footer-text">
            <p>
                Access a range of doctor-trusted weight loss medications
            </p>
        </div>
    </footer>
</body>

</html>
